<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Catálogo</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="irACarrito()">
        <ion-icon slot="icon-only" name="cart-sharp"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item *ngFor="let producto of productos">
      <ion-label>
        <h2>{{ producto.nombre }}</h2>
        <p>Autor: {{ producto.autor }}</p>
        <p>Precio: {{ producto.precio | currency }}</p>
      </ion-label>
      <ion-button slot="end" fill="outline" color="success" (click)="agregarAlCarrito(producto)">
        Agregar
      </ion-button>
    </ion-item>
  </ion-list>

  <div class="boton-volver">
    <ion-button expand="block" color="medium" (click)="volverInicio()">Volver a Inicio</ion-button>
  </div>
</ion-content>
