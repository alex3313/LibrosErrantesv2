<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Carrito</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item *ngFor="let item of carrito">
      <ion-label>
        <h2>{{ item.nombre }}</h2>
        <p>Autor: {{ item.autor }}</p>
        <p>Precio: {{ item.precio | currency }}</p>
        <p>Cantidad: {{ item.cantidad }}</p>
      </ion-label>
      <ion-button fill="clear" color="danger" (click)="quitarDelCarrito(item)">
        <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
      </ion-button>
    </ion-item>
  </ion-list>

  <div class="botones-carrito">
    <ion-button expand="block" color="success" (click)="IraComprar()">Comprar</ion-button>
    <ion-button expand="block" color="medium" (click)="volverInicio()">Volver a Inicio</ion-button>
    <ion-button expand="block" color="light" (click)="volverCatalogo()">Volver a Catálogo</ion-button>
  </div>
</ion-content>
